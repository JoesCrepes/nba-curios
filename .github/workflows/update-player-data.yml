name: Update Player Season Data

on:
  schedule:
    # Run daily at 9 AM ET (1 PM UTC) — stagger from the season-trajectories job
    - cron: '0 13 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'projects/nba-two-point-percentage/scripts/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r projects/nba-two-point-percentage/scripts/requirements.txt

      - name: Fetch current season data
        run: python projects/nba-two-point-percentage/scripts/fetch_data.py --update-current

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet public/data/player_seasons.json || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push if data changed
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/player_seasons.json
          git commit -m "Update player season data - $(date +'%Y-%m-%d')"
          git push
